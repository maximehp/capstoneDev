services:
  migrate:
    build:
      context: .
      target: web-runtime
    env_file:
      - .env
    environment:
      DEBUG: ${DEBUG:-0}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-127.0.0.1,localhost}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL must be set}
      RUN_COLLECTSTATIC: "0"
      RUN_MIGRATIONS: "1"
    command: python manage.py check

  web:
    build:
      context: .
      target: web-runtime
    depends_on:
      migrate:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      DEBUG: ${DEBUG:-0}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-127.0.0.1,localhost}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL must be set}
      TEMPLATE_BUILD_WORKDIR: ${TEMPLATE_BUILD_WORKDIR:-/var/lib/capstone/jobs}
      APP_USERDATA_DIR: ${APP_USERDATA_DIR:-/mnt/capstone-nas/UserData}
      RUN_COLLECTSTATIC: "1"
      RUN_MIGRATIONS: "0"
    ports:
      - "8000:8000"
    restart: unless-stopped
    volumes:
      - type: bind
        source: ${PACKER_JOBS_HOST_PATH:-/srv/capstone/packer-jobs}
        target: /var/lib/capstone/jobs
      - type: bind
        source: ${PACKER_NAS_HOST_PATH:-/mnt/capstone-nas}
        target: /mnt/capstone-nas

  packer-worker:
    build:
      context: .
      target: packer-runtime
    user: "1000:1000"
    depends_on:
      migrate:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      DEBUG: ${DEBUG:-0}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-127.0.0.1,localhost}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL must be set}
      TEMPLATE_BUILD_WORKDIR: ${TEMPLATE_BUILD_WORKDIR:-/var/lib/capstone/jobs}
      PACKER_CACHE_DIR: ${PACKER_CACHE_DIR:-/mnt/capstone-nas/Templates/packer-cache}
      PACKER_NAS_ROOT: ${PACKER_NAS_ROOT:-/mnt/capstone-nas}
      PACKER_NAS_ARCHIVE_DIR: ${PACKER_NAS_ARCHIVE_DIR:-/mnt/capstone-nas/Templates/archives}
      APP_USERDATA_DIR: ${APP_USERDATA_DIR:-/mnt/capstone-nas/UserData}
      PACKER_BIN: ${PACKER_BIN:-/usr/bin/packer}
      PACKER_ISO_TOOL: ${PACKER_ISO_TOOL:-xorriso}
      RUN_COLLECTSTATIC: "0"
      RUN_MIGRATIONS: "0"
    restart: unless-stopped
    volumes:
      - type: bind
        source: ${PACKER_JOBS_HOST_PATH:-/srv/capstone/packer-jobs}
        target: /var/lib/capstone/jobs
      - type: bind
        source: ${PACKER_NAS_HOST_PATH:-/mnt/capstone-nas}
        target: /mnt/capstone-nas
