  slides/13-minio.html:
    title: "MinIO"
    speaker: "Liam Callahan"
    notes: |-
      - MinIO is an S3-compatible object storage solution - like AWS S3, but self-hosted
      - Used to store artifacts from the pipeline  - terraform state files, ansible inventory files
      - A json is essentially a structured way to store data as text that both we and computers can read and understand - think of a form with fields and values, but in a text format
      - Allows Terraform and Ansible to be decoupled into 2 seperate jobs in the pipeline, since forgejo doesn't have artifact storage


  slides/14-packer.html:
    title: "Packer"
    speaker: "Liam Callahan"
    notes: |-
      - Packer is a tool to create Golden Templates or reference model that all other VMs are built from - this also reduces the time to create VMs since not every one has to go through the boot sequence
      - Packer first spins up a temporary VM within proxmox and attaches a CDROM that contains our autoinstall configs and a Packer SSH key
      - Packer waits for the boot process to complete and then connects to the VM via SSH to run provioning scripts that install software and agents that should be baked on every VM
      - Before Packer finishes, it detaches the CDROM disk, injects an Ansible SSH key, and removes the Packer SSH key - VMs are only accesible by Ansible after the build process is complete
      - VM then gets turned into a template that then gets used by Terraform to spin up VMs 

  slides/15-terraform.html:
    title: "Terraform"
    speaker: "Liam Callahan"
    notes: |-
      - Terraform init: initializes the Terraform working directory, downloads providers, and connects to the MinIO backend to pull the latest state file
      - Terraform Destroy: only gets ran when explictly triggered, this destroys all infrastructure defined in the state file
      - Terraform plan: compares the desired infrastructure defined in the .tf files with the current state in proxmox and generates an execution plan to reach the desired state
      - Terraform apply: applies the execution plan generated by terraform plan, this is where the actual infrastructure changes happen in proxmox
      - Terraform then exports a new state file and vm_info.json so Ansible knows what to configure
      - Since Terraform destroys everything it knows about the data disks are handled separately using a null_resource (api call to proxmox without a wrapper) that detaches the data disk before destory and reattaches it on creation
  slides/16-ansible.html:
    title: "Ansible"
    speaker: "Liam Callahan"
    notes: |-
      - At this point the VMs are up and running, but they need to be configure to be actually useful
      - Ansible configures these VMs by connecting to them via the ansible ssh key and runs playbooks that install software, configure settings, and run scripts that are specific to the VM
      - First Ansible needs to generate it's inventory, by pulling the from the vm_info.json file it generates a dynamic inventory of all the VMs that are running that include their name, ip address, and role
      - The first thing Ansible does is run a common playbook on all the VMs that does shared configuration such as enabling agents or creating a Linux User
      - Ansible then runs playbooks on these VMs according to their specificied role, webdev would get the webdev playbook, security would get the security playbook, and so on
      - The end result is that an entire environment, from bare proxmox to fully configured VMs, are automated with a single pipeline trigger

