  slides/40-web-development.html:
    title: "Web Development"
    speaker: "Maxime Hendryx-Parker"
    notes: |-
      Now we are moving into the web development side of ChirpLabs
      This is where all of the infrastructure work turns into something students and faculty can actually click on and use
      The focus was the Django app, the login flow, the template builder, and the VM workflow
      Before getting into how it works, let us start with what it actually gives the user

  slides/41-development-summary.html:
    title: "What Web Development Built"
    speaker: "Maxime Hendryx-Parker"
    notes: |-
      The web app gives ChirpLabs one central place to start from
      Users sign in with Active Directory instead of juggling a separate account
      Faculty can create templates, watch the build progress, and users can start VMs from completed templates
      The big idea is that people should not need to live inside Proxmox just to use the lab
      But if this is going to be the front door to the lab, it also has to feel quick

  slides/42-frontend-architecture.html:
    title: "How the Website Feels Fast"
    speaker: "Maxime Hendryx-Parker"
    notes: |-
      The frontend is still server-rendered Django at the foundation.
      We used vanilla JavaScript to improve the experience without adding a full frontend framework.
      Partial navigation lets the page fetch only the main content area and swap it into place.
      That keeps themes, modals, and page state feeling smoother than a full reload.
      Now, an app can feel great, but it also needs to look great

  slides/43-user-flow-and-interaction.html:
    title: "The Main User Journey"
    speaker: "Maxime Hendryx-Parker"
    notes: |-
      The main flow starts with login and then lands the user on the home page.
      From there, they can open the creator flow, choose settings, and move into the build progress view.
      Settings stays close by for account information, theme preference, and access status.
      The important part is that the workflow is guided instead of asking users to know Proxmox concepts first.
      There is, however, more to it than the look

  slides/44-backend-architecture.html:
    title: "PostgreSQL: The Source of Truth"
    speaker: "Maxime Hendryx-Parker"
    notes: |-
      Behind the interface, PostgreSQL is the source of truth
      Django stores the AD-synced users, directory roles, saved ISO and software sources, templates, build jobs, and provisioned VMs
      The Packer worker also coordinates through the database by claiming queued jobs, updating stages, and writing results
      Shared storage still holds the build files, logs, staged ISOs, and archives, but the database is what tells the app what everything means
      Once that state is reliable, the next question is how a click turns into actual Proxmox work


  slides/45-api-flow-and-execution.html:
    title: "Backend API and Worker Execution"
    speaker: "Maxime Hendryx-Parker"
    notes: |-
      The backend has JSON endpoints for login, ISO and software checks, template creation, build status, and VM starts
      Template creation validates the request, saves the job, and returns quickly so the browser is not stuck waiting on Packer
      The worker comes in later, claims the job, stages the ISO, generates the Packer files, runs the build, and reports progress
      VM provisioning validates the selected template, asks Proxmox to clone, configure, and start the VM, and then records the result
      So the foundation is there, but there are still a few big pieces before this becomes the full lab experience

  slides/46-development-whats-still-needed.html:
    title: "What's Still Needed"
    speaker: "Maxime Hendryx-Parker"
    notes: |-
      The next major step is the full class lab workflow
      That means class join codes, template assignments, lab timers, and better VM history for users
      We also still need browser-based access through Apache, Guacamole, and guacd
      On the operations side, the app needs CI/CD, stronger audit logging, analytics, and more live browser testing
      That is what is left for web development, so now let us pull the full project back together

  slides/47-conclusion.html:
    title: "Conclusion"
    speaker: "Maxime Hendryx-Parker"
    notes: |-
      Across the project, every group was working on a different layer of the same platform
      Infrastructure gave us the compute and storage foundation
      Networking made that foundation reachable and segmented
      Security and monitoring made it easier to defend, observe, and improve
      Web development gave users a path into the lab without needing to manage the platform by hand
      And none of that happens without the people behind the work

  slides/48-our-team.html:
    title: "Our Team"
    speaker: "Maxime Hendryx-Parker"
    notes: |-
      This slide is here because ChirpLabs was not one person's project
      It took coordinators, speakers, infrastructure work, monitoring work, networking work, security work, and development work
      It also took a lot of help from faculty, staff, panelists, and people who answered questions when the project got messy
      So before we finish, we want to recognize everyone who helped bring this together
      And with that, we are happy to take your questions

  slides/49-questions.html:
    title: "Questions?"
    speaker: "Maxime Hendryx-Parker"
    notes: |-
      Thank you to the panel, faculty, and everyone who contributed to the project
      We appreciate your time and feedback
      We are happy to answer any questions
