  slides/01-capstone-in-cit-applied-cybersecurity.html:
    title: "Capstone in CIT/Applied Cybersecurity"
    speaker: "Dr. David Hua"
    notes: |-
      Introduce this as a multi-team capstone: hardware, network, security, observability, automation, and application development all converged into one lab platform.

  slides/02-what-we-built.html:
    title: "What We Built"
    speaker: "Maxime Hendryx-Parker"
    notes: |-
      Incredible to work on something so passionate about.
      This semester we've been working on ChirpLabs.
      Platform for online students to access lab resources anywhere anytime.
      Now you may be wondering, how did we do this?

  slides/03-how-the-pieces-connect.html:
    title: "How the Pieces Connect"
    speaker: "Maxime Hendryx-Parker"
    notes: |-
      We split ourselves into groups across different layers of the project.
      Each group had a coordinator that managed members and advocated for their group.
      To discuss the infrastructure group, here is group coordinator Liam Callahan.

  slides/04-infrastructure.html:
    title: "Infrastructure"
    speaker: "Liam Callahan"
    notes: |-
      Transition from overview into the physical and virtual foundation.

  slides/05-base-infrastructure.html:
    title: "Base Infrastructure"
    speaker: "Liam Callahan"
    notes: ""

  slides/06-nas-hardware.html:
    title: "NAS Hardware"
    speaker: "Eli Thompson"
    notes: |-
      - Thank Speaker for letting me speak
      - from 5 NAS with 2 accessible, to 3 that weren't
      - Overhaul: 3 NAS servers, main, replication, sandbox
      - upgrade hd, and ram to suit needs

  slides/07-pbs-architecture.html:
    title: "PBS Architecture"
    speaker: "Eli Thompson"
    notes: |-
      - PBS: another external data protection system
      - Explain what PBS does: snapshots, replication, and backup
      - How protected, direct passthrough and Mom dataset

  slides/08-replication-architecture.html:
    title: "Replication Architecture"
    speaker: "Eli Thompson"
    notes: |-
      - Replication: lost... replication. snapshot of all important datasets
      - Connection of SSH for replication NAS
      - This way redundacny disaster recovery : two layers

  slides/09-iac-ci-cd.html:
    title: "IaC / CI-CD"
    speaker: "Liam Callahan"
    notes: |-
      - IaC = Infrastructure as Code — every VM, container, and service is defined in code
      - CI/CD = automated pipeline that takes that code and builds, deploys, or destroys infrastructure
      - Goal: destroy and recreate the entire environment with a single trigger

  slides/10-forgejo-and-runners.html:
    title: "Forgejo & Runners"
    speaker: "Liam Callahan"
    notes: |-
      - Forgejo: self-hosted Git platform, triggers the pipeline on push
      - Act Runners: self-hosted workers that execute the jobs
      - Secrets injected at runtime — never stored in the repo
      - ChirpLabs scoped as one tenant; other teams share the infra without overlap


  slides/11-iac-full-pipeline.html:
    title: "IaC: Full Pipeline"
    speaker: "Liam Callahan"
    notes: |-
      - Three workflows: Packer, Terraform, Ansible — each its own job
      - One orchestration workflow chains all three with a single trigger
      - Goes from bare Proxmox + ISO to fully configured VMs



  slides/12-three-way-data-split.html:
    title: "Three-way Data Split"
    speaker: "Liam Callahan"
    notes: |-
      - Forgejo: source of truth for all configuration
      - Boot disk: ephemeral, wiped and rebuilt every run
      - Data disk: persists across every rebuild — app data is never lost



  slides/13-minio.html:
    title: "MinIO"
    speaker: "Liam Callahan"
    notes: |-
      - Self-hosted S3-compatible storage (like AWS S3 on our own hardware)
      - Stores Terraform state and vm_info.json between pipeline jobs
      - Bridges Terraform and Ansible since Forgejo has no artifact storage

  slides/14-packer.html:
    title: "Packer"
    speaker: "Liam Callahan"
    notes: |-
      - Builds a golden VM template with shared agents and software pre-baked
      - Spins up a temp VM, provisions via SSH, converts to a reusable template
      - Swaps Packer SSH key for Ansible's before finishing — only Ansible can access VMs after


  slides/15-terraform.html:
    title: "Terraform"
    speaker: "Liam Callahan"
    notes: |-
      - Init: pulls state from MinIO
      - Plan: compares desired state against Proxmox
      - Apply: creates or updates VMs
      - Destroy: explicit only — tears down everything in the state file
      - Data disks handled separately so they survive destroy/recreate cycles
      - Outputs vm_info.json for Ansible


  slides/16-ansible.html:
    title: "Ansible"
    speaker: "Liam Callahan"
    notes: |-
      - Reads vm_info.json to build a dynamic inventory of all running VMs
      - Runs a common playbook on every VM for shared setup (agents, users, etc.)
      - Applies role-specific playbooks based on each VM's purpose
      - One trigger: bare Proxmox → fully configured environment

  slides/17-what-s-still-needed.html:
    title: "What's Still Needed"
    speaker: "Liam Callahan"
    notes: |-
      - Currently Packer has to use something called a matrix that runs the same build process across each node because Terraform isn't able to copy the templates across nodes due to certificate issues

  slides/18-networking.html:
    title: "Networking"
    speaker: "Romeo Casiano"
    notes: |-
      Now we are moving into the networking side of the project.
      Networking was the last major group connecting the platform together.
      Our work focused on the subnet redesign, Proxmox SDN, VLAN separation, and resolving connectivity issues.
      First, I will cover the expanded segmentation work.

  slides/19-networking-overview.html:
    title: "Networking Overview"
    speaker: "Romeo Casiano"
    notes: |-
      We started with a smaller network design that did not leave enough clean room for growth.
      The lab moved from a /24 network with six /28 subnets and many unassigned IP addresses to a full /21 network.
      That gave us seven VLANs, with each VLAN having a full /24 subnet to work with.
      We also worked through the Proxmox SDN side so VMs could land in the correct subnet with the correct VLAN separation.
      Next, Drew will go deeper into the subnetting changes.

  slides/20-subnetting.html:
    title: "Subnetting"
    speaker: "Drew Barkdull"
    notes: |-
      The original design was a /24 network split into six /28 subnets.
      We updated that into a /21 network with seven VLANs, and each VLAN now has a full /24 subnet available.
      We also updated switch and Proxmox configurations to match the new subnet layout.
      That included updating trunks, etherchannels, and VLAN separation so the addressing plan worked across the physical and virtual network.
      Next, Romeo will explain the Proxmox setup and SDN configuration.

  slides/21-proxmox-sdn-setup.html:
    title: "Proxmox Setup and Configuration"
    speaker: "Romeo Casiano"
    notes: |-
      In Proxmox, the enterprise bridge uses LACP balance-slb for the bond configuration.
      The student lab bridge uses an active-backup bond with an OVS bridge.
      Linux bonds and bridges are built into Linux networking and are simpler to configure.
      OVS bonds and bridges add more advanced network features, especially VLAN control for VM placement.
      Next is the troubleshooting work we ran into while making the design stable.

  slides/22-networking-troubleshooting.html:
    title: "Networking Troubleshooting"
    speaker: "Romeo Casiano"
    notes: ""

  slides/23-networking-recommendations.html:
    title: "What's Still Needed"
    speaker: "Romeo Casiano"
    notes: |-
      The next networking improvement is firewalling between the Proxmox bridges.
      That would give us better control over traffic moving between the enterprise side and the student lab side.
      We also need clearer security policies for what traffic should be allowed, blocked, and monitored.
      After networking, Chad will walk through the security side of the project.

  slides/24-security.html:
    title: "Security"
    speaker: "Chad Becker"
    notes: |-
      - Thank you Romeo, hello gentlemen, I want to thank you all for your time today
      - I had the privilege of being the leader of the Security Group
      - Our goals consisted of implementing a SIEM stack, installing the OPNsense firewall at the edge of the network, and performing basic vulnerability scans on all physical hardware hosts

  slides/25-siem-overview.html:
    title: "SIEM Overview"
    speaker: "Chad Becker"
    notes: |-
      - We implemented a comprehensive logging solution known as a SIEM
      - Our SIEM stack mainly focuses on detection and does not contain many automated response elements commonly found in a SIEM stack due to a lack of time
      - Solutions are implemented for Log Ingestion, Log Analysis Intelligence Enrichment, Backend Storage, Automation, and basic visualization

  slides/26-log-ingestion-wazuh.html:
    title: "Log Ingestion: Wazuh"
    speaker: "Chad Becker"
    notes: |-
      - Log ingestion on manager from Wazuh agents that will be installed on every template
      - Assigns each log a vulnerability ranking between 0-15
      - Sends logs to Graylog via a Filebeat Pipeline

  slides/27-log-analysis-graylog.html:
    title: "Log Analysis: Graylog"
    speaker: "Chad Becker"
    notes: |-
      - Graylog ingests and analyzes Wazuh logs through the creation of a Graylog Pipelinecustom stream/index set, and pipeline rules
      - These rules pull specific information such as usernames and source IP addresses to create normalized fields for easier searching and basic visualization within Graylog
      - Due to a lack of time we were unable to integrate Graylog with the desired visualization solution Grafana. Basic dashboards were created to visualize events and fields such as security events overview,  failed authentication attempts, and Wazuh vulnerability rankings
      - Brute force detection (both normal and aggressive) was enabled as a security event

  slides/28-automation-shuffle.html:
    title: "Automation: Shuffle"
    speaker: "Chad Becker"
    notes: |-
      - Establishes workflows between triggers and contact services such as email
      - Generates automated responses to Wazuh alerts and Graylog events via a webhook trigger

  slides/29-intelligence-enrichment-misp.html:
    title: "Intelligence Enrichment: MISP"
    speaker: "Baylen Small"
    notes: |-
      - Edit the custom python integration script by making changes to the hook URL, MISP API key, group, and rule ID  located in the ossec.conf block.
      - The custom MISP Python file is volume mounted on Wazuh manager docker container into the ossec/integrations directory by editing docker-compose.yml. Mounting the Python Script enables version control on the docker host.
      - MISP threat intelligence information is sent to Wazuh. When Wazuh ingests logs from the Wazuh agents, the logs are compared against MISP threat intelligence. Any matches generate a threat notification.

