services:
  migrate:
    volumes:
      - .:/app

  web:
    command: python manage.py runserver 0.0.0.0:8000
    environment:
      DEBUG: ${DEBUG:-1}
      DATABASE_URL: ${DATABASE_URL:-}
      RUN_COLLECTSTATIC: "0"
    volumes:
      - .:/app
      - type: bind
        source: ${PACKER_JOBS_HOST_PATH:-./database/packer_templates/jobs}
        target: /var/lib/capstone/jobs
      - type: bind
        source: ${PACKER_NAS_HOST_PATH:-./database/nas}
        target: /mnt/capstone-nas

  packer-worker:
    environment:
      DEBUG: ${DEBUG:-1}
      DATABASE_URL: ${DATABASE_URL:-}
      PACKER_BIN: ${PACKER_BIN:-/usr/bin/packer}
      PACKER_ISO_TOOL: ${PACKER_ISO_TOOL:-xorriso}
      RUN_COLLECTSTATIC: "0"
    volumes:
      - .:/app
      - type: bind
        source: ${PACKER_JOBS_HOST_PATH:-./database/packer_templates/jobs}
        target: /var/lib/capstone/jobs
      - type: bind
        source: ${PACKER_NAS_HOST_PATH:-./database/nas}
        target: /mnt/capstone-nas
